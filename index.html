<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#27ae60;--bg:#faf8f5;--card:#fff;--text:#1a1a1a;--muted:#aaa;--border:#efefef;--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;max-width:480px;margin:0 auto}
.topbar{padding:20px 18px 0;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.topbar h1{font-family:"DM Serif Display",serif;font-size:1.5rem;letter-spacing:-.5px}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin:0 0 16px;padding:0 18px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab.on{color:var(--p);border-bottom-color:var(--p)}
.pg{display:none;padding:0 16px}
.pg.on{display:block}
.card{background:var(--card);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.bnr{border-radius:var(--r);padding:16px 18px;margin-bottom:12px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.s3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.sv{font-family:"DM Serif Display",serif;font-size:1.5rem;line-height:1;margin-bottom:2px}
.sl{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase}
.bb{background:#f0f0f0;border-radius:99px;height:7px;overflow:hidden;margin-bottom:4px}
.bf{height:100%;border-radius:99px;transition:width .4s}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-family:"DM Sans",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all .15s}
.bg{background:#2ecc71;color:#fff}
.ba{background:#f39c12;color:#fff}
.bgh{background:#f0f0f0;color:#666}
.bo{background:transparent;border:2px dashed #ddd;color:#999}
.wr{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.wr:last-of-type{border-bottom:none}
.wi{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f7f7f7;border-radius:9px;font-size:1.15rem}
.wlink{display:inline-flex;align-items:center;gap:4px;font-size:.71rem;font-weight:700;padding:5px 11px;border-radius:7px;color:#fff;text-decoration:none}
.wbadge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:.63rem;font-weight:700;margin-left:5px;vertical-align:middle}
.w1kg{background:#ffeaea;color:#c0392b}
.w2kg{background:#eafaf1;color:#27ae60}
.tip{border-radius:10px;padding:11px 13px;margin-top:12px;font-size:.78rem;line-height:1.65;color:#444}
.infob{display:flex;align-items:flex-start;gap:8px;border-radius:10px;padding:10px 12px;font-size:.78rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.mrow{display:flex;gap:8px;flex-wrap:wrap}
.mbtn{flex:1;min-width:60px;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:transparent;font-family:"DM Sans",sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mbtn.on{border-color:var(--p);background:var(--p);color:#fff}
.ebtn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:transparent;font-family:"DM Sans",sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.ebtn.on{border-color:#f39c12;background:#f39c12;color:#fff}
.lmove{background:#f9f9f9;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--p)}
.lmove h4{font-size:.88rem;font-weight:700;margin-bottom:3px}
.lmove p{font-size:.76rem;color:#666;line-height:1.5}
.lmove .sets{font-size:.72rem;font-weight:700;color:var(--p);margin-top:4px}
.mpop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mpopinn{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%}
.mpopinn h2{font-family:"DM Serif Display",serif;font-size:1.8rem;margin-bottom:8px}
.mpopinn p{font-size:.88rem;color:#777;line-height:1.6;margin-bottom:20px}
.cal-hr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cc{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);font-family:"DM Sans",sans-serif;font-size:.68rem;cursor:pointer;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;line-height:1.2;transition:all .15s}
.cc.hp{color:#fff;border-color:transparent}
.cc.dn::after{content:"✓";position:absolute;top:1px;right:2px;font-size:8px;font-weight:900}
.cc.pt::after{content:"◑";position:absolute;top:1px;right:2px;font-size:8px}
.cc.emp{border-color:transparent;cursor:default;background:transparent}
.ccd{font-size:.74rem;font-weight:700}
.ccc{font-size:.5rem;opacity:.85}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mitem{background:#f9f9f9;border-radius:10px;padding:10px 12px}
.mlabel{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.mval{font-family:"DM Serif Display",serif;font-size:1.3rem;color:var(--text)}
.mch{font-size:.68rem;margin-top:2px}
.cup{color:#e74c3c}.cdn{color:#27ae60}.csa{color:var(--muted)}
input[type=number],input[type=text],input[type=date]{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:.9rem;color:var(--text);background:#fff;margin-bottom:8px}
input:focus{outline:none;border-color:var(--p)}
.srow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.srow:last-child{border-bottom:none}
.srow span:last-child{font-weight:700;color:var(--p)}
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;padding:24px}
.setup h2{font-family:"DM Serif Display",serif;font-size:1.8rem;margin-bottom:8px}
.setup p{font-size:.84rem;color:#777;line-height:1.6;margin-bottom:20px}
.ppill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff;margin-bottom:12px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legrow{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:8px}
.legitem{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#999}
.saf{text-align:center;font-size:.71rem;color:var(--muted);line-height:1.8;padding:16px}
.saf strong{color:#e74c3c}
.olbanner{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:10px 12px;font-size:.78rem;color:#856404;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PHASES = {
  menstrual:{l:"Menstruation",c:"#c0392b",lt:"#fdecea"},
  follicular:{l:"Follicular",c:"#27ae60",lt:"#eafaf1"},
  ovulation:{l:"Ovulation",c:"#e67e22",lt:"#fef5ec"},
  lutealEarly:{l:"Early Luteal",c:"#8e44ad",lt:"#f5eef8"},
  lutealLate:{l:"Late Luteal",c:"#2980b9",lt:"#eaf4fb"}
};
var PO = ["menstrual","follicular","ovulation","lutealEarly","lutealLate"];
var PLL = {menstrual:"Menstruation (1-3)",follicular:"Follicular (4-12)",ovulation:"Ovulation (13-15)",lutealEarly:"Early Luteal (16-21)",lutealLate:"Late Luteal (22-30)"};
var DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var MONS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var MFIELDS = ["weight","waist","hips","arms","thighs","calves","ankles","wrists","lowerBelly","upperBelly","neck","chest"];
var MLABELS = {weight:"Weight (kg)",waist:"Waist (cm)",hips:"Hips (cm)",arms:"Arms (cm)",thighs:"Thighs (cm)",calves:"Calves (cm)",ankles:"Ankles (cm)",wrists:"Wrists (cm)",lowerBelly:"Lower Belly (cm)",upperBelly:"Upper Belly (cm)",neck:"Neck (cm)",chest:"Chest (cm)"};

var VIDS = {
  walk1:{i:"🚶",n:"Heart Healthy 1 Mile Walk",d:"Walk at Home - Gentle",l:"https://youtu.be/u08lo0bESJc"},
  walk3:{i:"🚶",n:"3 Mile Heart Association Walk",d:"Walk at Home - 45 min",l:"https://youtu.be/DYuw4f1c4xs"},
  arms:{i:"💪",n:"20-Min Standing Arm Workout",d:"fitbymik - No pushups",l:"https://youtu.be/M5LcX_dpL34"},
  abs:{i:"🔥",n:"10-Min Standing Abs Workout",d:"fitbymik - One dumbbell",l:"https://youtu.be/KVt_uBX-XQw"}
};

var LEG_MOVES = [
  {name:"Standing Side Leg Raises",desc:"Stand tall, hold wall for balance. Lift leg straight out to side, no higher than hip. Slow and controlled.",sets:"3 sets x 15 reps each side - rest 30 sec"},
  {name:"Standing Rear Kickbacks",desc:"Hold support, tilt slightly forward. Kick leg straight back - small range, squeeze glute at top. Do not swing or arch back.",sets:"3 sets x 15 reps each side - rest 30 sec"},
  {name:"Inner Thigh Standing Pulses",desc:"Feet wider than hip width. Pulse one knee gently inward, squeezing inner thigh. Keep movement small.",sets:"3 sets x 20 pulses each side - rest 20 sec"},
  {name:"Calf Raises",desc:"Feet hip width. Rise onto toes slowly, hold 1 second at top, lower slowly. Hold chair for balance.",sets:"3 sets x 20 reps - rest 20 sec"},
  {name:"Standing Hip Abduction Hold",desc:"Lift one leg out to side and HOLD for 10 seconds. Lower slowly. Builds hip stability without impact.",sets:"3 holds x 10 sec each side - rest 20 sec"}
];

var WARMUP = ["Shoulder rolls - 10 forward, 10 back","Neck rolls - slow, 5 each direction","Ankle circles - 10 each foot","Arm circles - 10 small, 10 large each arm","March in place - 1 minute, knees low"];
var COOLDOWN = ["Calf stretch - hold wall, 30 sec each leg","Shoulder cross stretch - 30 sec each arm","Standing quad stretch - hold support, 20 sec each leg","Deep breathing - 5 slow breaths in through nose, out through mouth"];

var AFFS = {
  menstrual:["Your rest is productive. Your body is renewing itself.","Softness is not weakness. Rest is strength.","You are allowed to slow down and still be enough."],
  follicular:["Energy is rising. Something new is beginning in you.","You are building momentum one rep at a time.","Your consistency is your superpower."],
  ovulation:["You are at your most powerful. Use it.","Peak energy, peak clarity, peak you. Go.","This is your window. Make it count."],
  lutealEarly:["You are stronger than you feel right now.","Showing up on the hard days is the real victory.","Your body is doing its best. So are you."],
  lutealLate:["Gentle is enough. Consistent is everything.","You do not have to earn rest. You deserve it.","Every small effort compounds into something great."]
};

var MILESTONES = [7,14,21,30,60,90];
var MMSGS = {7:"One full week of showing up. That is not nothing - that is everything.",14:"Two weeks. Your body is already changing. Keep going.",21:"21 days. This is where habits form. You built one.",30:"30 days. One full cycle of consistency. You are different now.",60:"60 days. Two months of showing up for yourself. Incredible.",90:"90 days. This is not a routine anymore. This is who you are."};

// STORAGE
var K = {CS:"wt3_cs",DN:"wt3_dn",PT:"wt3_pt",SK:"wt3_sk",MD:"wt3_md",EN:"wt3_en",MS:"wt3_ms",IT:"wt3_it",MG:"wt3_mg",HI:"wt3_hi",SM:"wt3_sm"};
function lsGet(k,fb){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch(e){return fb;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// DATE HELPERS
function today(){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function parseDate(s){var p=s.split("-");return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function toStr(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:String(n);}
function dayDiff(a,b){return Math.floor((b-a)/86400000);}
function fmtDate(d){return DOW[d.getDay()]+", "+d.getDate()+" "+MONS[d.getMonth()]+" "+d.getFullYear();}
function fmtShort(d){return d.getDate()+" "+MONS[d.getMonth()].slice(0,3);}
function getHour(){return new Date().getHours();}
function greet(){var h=getHour();if(h<12)return"Good morning";if(h<17)return"Good afternoon";return"Good evening";}
function getMonday(d){var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);var m=new Date(d);m.setDate(diff);return m;}

// PHASE
function getPhase(d){if(d<=3)return"menstrual";if(d<=12)return"follicular";if(d<=15)return"ovulation";if(d<=21)return"lutealEarly";return"lutealLate";}

// WORKOUT SPLIT (7-day rotating)
function getSplit(cd){return((cd-1)%7)+1;}
function getWorkout(cd,phase){
  var split=getSplit(cd);
  var heavy=["follicular","ovulation","lutealEarly"].indexOf(phase)>=0;
  var kg=heavy?"2kg":"1kg";
  if(split===1)return{type:"workout",focus:"Arms",vids:[{v:VIDS.arms,kg:kg}],tip:"Slow your reps - 3 counts down, 1 up. Makes "+kg+" feel twice as hard."};
  if(split===2)return{type:"workout",focus:"High Cardio",vids:[{v:VIDS.walk3,kg:null}],tip:phase==="ovulation"?"Peak energy - push your pace the full 45 mins!":"Steady pace, consistent effort. Full 3 miles today."};
  if(split===3)return{type:"legs",focus:"Legs"};
  if(split===4)return{type:"rest",note:"Rest day. Recovery is where your muscles actually grow. This is productive."};
  if(split===5)return{type:"workout",focus:"Arms + Abs",vids:[{v:VIDS.arms,kg:kg},{v:VIDS.abs,kg:kg}],tip:"Arms then abs back to back. Add 5 pulse reps at end of each move."};
  if(split===6)return{type:"workout",focus:"Cardio",vids:[{v:VIDS.walk1,kg:null}],tip:"Gentle cardio day. 1 mile, easy pace, focus on breathing."};
  return{type:"rest",note:"Rest day. Two rest days per week keeps you sustainable for months."};
}

// STATE
var S = {
  cs: lsGet(K.CS,null),
  dn: new Set(lsGet(K.DN,[])),
  pt: new Set(lsGet(K.PT,[])),
  sk: lsGet(K.SK,{c:0,l:0}),
  mood: lsGet(K.MD,{}),
  energy: lsGet(K.EN,{}),
  meas: lsGet(K.MS,[]),
  intentions: lsGet(K.IT,{}),
  goal: lsGet(K.MG,20),
  history: lsGet(K.HI,[]),
  seenMs: new Set(lsGet(K.SM,[])),
  tab: "today",
  selDate: null,
  pendingMs: null
};

// CYCLE DAY
function cycleDay(date){
  if(!S.cs)return null;
  var diff=dayDiff(parseDate(S.cs),date)+1;
  if(diff<1)return null;
  return((diff-1)%30)+1;
}
function calDate(cd){return new Date(parseDate(S.cs).getTime()+(cd-1)*86400000);}

// STREAK
function calcStreak(){
  var all=new Set([].concat([...S.dn],[...S.pt]));
  var sorted=[...all].map(function(s){return parseDate(s);}).sort(function(a,b){return a-b;});
  if(!sorted.length){S.sk={c:0,l:0};return;}
  var l=1,c=1,i;
  for(i=1;i<sorted.length;i++){
    if(dayDiff(sorted[i-1],sorted[i])===1){c++;if(c>l)l=c;}else{c=1;}
  }
  var cur=0,ch=today();
  while(true){var s=toStr(ch);if(all.has(s)){cur++;ch=new Date(ch-86400000);}else{break;}}
  S.sk={c:cur,l:Math.max(l,cur)};
  lsSave(K.SK,S.sk);
  for(var mi=0;mi<MILESTONES.length;mi++){
    var m=MILESTONES[mi];
    if(S.sk.c>=m&&!S.seenMs.has(m)){S.pendingMs=m;S.seenMs.add(m);lsSave(K.SM,[...S.seenMs]);}
  }
}

// OVERLOAD CHECK
function showOverload(){
  if(!S.cs)return false;
  var dayIn=dayDiff(parseDate(S.cs),today())+1;
  return dayIn>=28&&dayIn<=31;
}

// MONTH STATS
function monthStats(){
  if(!S.cs)return null;
  var start=parseDate(S.cs);
  var done=0,partial=0,legs=0,arms=0,cardio=0,absD=0;
  for(var i=0;i<30;i++){
    var dt=new Date(start.getTime()+i*86400000);
    var ds=toStr(dt);
    var cd=i+1;
    if(S.dn.has(ds)||S.pt.has(ds)){
      var wk=getWorkout(cd,getPhase(cd));
      if(wk.type==="legs")legs++;
      else if(wk.type==="workout"){
        done++;
        if(wk.focus==="Arms")arms++;
        else if(wk.focus==="High Cardio"||wk.focus==="Cardio")cardio++;
        else if(wk.focus==="Arms + Abs"){arms++;absD++;}
      }
      if(S.pt.has(ds))partial++;
    }
  }
  return{done:done,partial:partial,legs:legs,arms:arms,cardio:cardio,abs:absD};
}

// RENDER
function render(){
  var app=document.getElementById("app");
  if(!S.cs){renderSetup(app);return;}
  calcStreak();
  var t=today();
  var cd=cycleDay(t);
  var phase=getPhase(cd);
  var p=PHASES[phase];
  document.documentElement.style.setProperty("--p",p.c);

  var tabLabels={today:"Today",calendar:"Calendar",measurements:"Measure",progress:"Progress",settings:"Settings"};
  var tabs=["today","calendar","measurements","progress","settings"];

  var topHtml="<div class='topbar'>";
  topHtml+="<div><div style='font-size:.72rem;color:var(--muted)'>"+greet()+", Mansi</div><h1>My Workout</h1></div>";
  topHtml+="<div style='text-align:right'><div style='font-size:.72rem;color:var(--muted)'>"+fmtDate(t)+"</div>";
  topHtml+="<div style='font-size:.8rem;font-weight:700;color:"+p.c+"'>Day "+cd+" - "+p.l+"</div></div>";
  topHtml+="</div>";

  var tabHtml="<div class='tabs'>";
  for(var ti=0;ti<tabs.length;ti++){
    tabHtml+="<div class='tab"+(S.tab===tabs[ti]?" on":"")+"' onclick='setTab(\""+tabs[ti]+"\")'>"+tabLabels[tabs[ti]]+"</div>";
  }
  tabHtml+="</div>";

  app.innerHTML=topHtml+tabHtml;

  var pageDiv=document.createElement("div");
  for(var pi=0;pi<tabs.length;pi++){
    var pg=document.createElement("div");
    pg.className="pg"+(S.tab===tabs[pi]?" on":"");
    pg.id="pg-"+tabs[pi];
    if(S.tab===tabs[pi]){
      if(tabs[pi]==="today")pg.innerHTML=buildToday();
      else if(tabs[pi]==="calendar")pg.innerHTML=buildCalendar();
      else if(tabs[pi]==="measurements")pg.innerHTML=buildMeasurements();
      else if(tabs[pi]==="progress")pg.innerHTML=buildProgress();
      else if(tabs[pi]==="settings")pg.innerHTML=buildSettings();
    }
    pageDiv.appendChild(pg);
  }
  app.appendChild(pageDiv);

  if(S.pendingMs){
    var ms=S.pendingMs;
    S.pendingMs=null;
    var pop=document.createElement("div");
    pop.className="mpop";
    pop.innerHTML="<div class='mpopinn'><div style='font-size:3rem;margin-bottom:12px'>🏆</div><h2>"+ms+" Day Streak!</h2><p>"+MMSGS[ms]+"</p><button class='btn bg' onclick='this.closest(\".mpop\").remove()'>Keep Going 💪</button></div>";
    app.appendChild(pop);
  }

  if(S.tab==="progress"){
    drawChart();
  }
}

// BUILD TODAY
function buildToday(){
  var t=today();
  var ts=toStr(t);
  var cd=cycleDay(t);
  var phase=getPhase(cd);
  var p=PHASES[phase];
  var wk=getWorkout(cd,phase);
  var isDone=S.dn.has(ts);
  var isPart=S.pt.has(ts);
  var affIdx=cd%AFFS[phase].length;
  var aff=AFFS[phase][affIdx];
  var focusLabel=wk.type==="rest"?"Recovery":wk.type==="legs"?"Tone Legs":wk.focus;
  var dayTypeLabel=wk.type==="rest"?"🌿 Rest Day":wk.type==="legs"?"🦵 Leg Day":"💪 "+wk.focus+" Day";

  var out="";

  // Banner
  out+="<div class='bnr' style='background:"+p.c+"'>";
  out+="<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px'>";
  out+="<div><div style='font-size:.78rem;opacity:.85'>Day "+cd+" of 30</div>";
  out+="<div style='font-family:DM Serif Display,serif;font-size:1.8rem;line-height:1;margin-bottom:2px'>"+p.l+"</div>";
  out+="<div style='font-size:.76rem;opacity:.8'>"+dayTypeLabel+"</div></div>";
  out+="<div><div style='background:rgba(255,255,255,.2);padding:4px 10px;border-radius:99px;font-size:.7rem;font-weight:700'>"+focusLabel+"</div></div>";
  out+="</div>";
  out+="<div style='font-style:italic;font-size:.8rem;opacity:.9;line-height:1.5;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;margin-top:4px'>\""+aff+"\"</div>";
  out+="</div>";

  // Stats
  out+="<div class='s3'>";
  out+="<div class='sc'><div style='font-size:1.2rem;margin-bottom:3px'>🔥</div><div class='sv' style='color:#e67e22'>"+S.sk.c+"</div><div class='sl'>Streak</div></div>";
  out+="<div class='sc'><div style='font-size:1.2rem;margin-bottom:3px'>🏆</div><div class='sv' style='color:#f39c12'>"+S.sk.l+"</div><div class='sl'>Best</div></div>";

function drawChart(){
  var canvas=document.getElementById("wChart");
  if(!canvas||S.meas.length<2)return;
  var data=[];
  var labels=[];
  for(var i=0;i<S.meas.length;i++){
    if(S.meas[i].weight){
      data.push(parseFloat(S.meas[i].weight));
      labels.push(S.meas[i].date);
    }
  }
  if(data.length<2)return;
  var ctx=canvas.getContext("2d");
  var cw=canvas.parentElement.offsetWidth-36;
  canvas.width=cw;canvas.height=180;
  var ch=180,pad=36;
  var minV=Math.min.apply(null,data)-2;
  var maxV=Math.max.apply(null,data)+2;
  ctx.clearRect(0,0,cw,ch);
  ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;
  for(var gi=0;gi<=4;gi++){
    var gy=pad+(ch-pad*2)*(gi/4);
    ctx.beginPath();ctx.moveTo(pad,gy);ctx.lineTo(cw-10,gy);ctx.stroke();
    ctx.fillStyle="#aaa";ctx.font="10px sans-serif";
    ctx.fillText((maxV-(maxV-minV)*(gi/4)).toFixed(1),2,gy+4);
  }
  ctx.strokeStyle="#27ae60";ctx.lineWidth=2.5;ctx.beginPath();
  for(var di2=0;di2<data.length;di2++){
    var gx=pad+(cw-pad-10)*di2/(data.length-1);
    var gvy=pad+(ch-pad*2)*(maxV-data[di2])/(maxV-minV);
    if(di2===0)ctx.moveTo(gx,gvy);else ctx.lineTo(gx,gvy);
  }
  ctx.stroke();
  ctx.fillStyle="#27ae60";
  for(var di3=0;di3<data.length;di3++){
    var gx2=pad+(cw-pad-10)*di3/(data.length-1);
    var gvy2=pad+(ch-pad*2)*(maxV-data[di3])/(maxV-minV);
    ctx.beginPath();ctx.arc(gx2,gvy2,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#333";ctx.font="9px sans-serif";
    ctx.fillText(data[di3],gx2-8,gvy2-8);
    ctx.fillStyle="#27ae60";
  }
}

  out+="</div>";

  out+="<div class='card'><div class='lbl'>ℹ️ Your 7-Day Split</div>";
  out+="<div style='font-size:.78rem;color:#555;line-height:1.9'>";
  out+="<div>Day 1 - Arms 💪</div><div>Day 2 - High Cardio (3 miles) 🚶</div><div>Day 3 - Legs (ankle weights) 🦵</div>";
  out+="<div>Day 4 - Rest 🌿</div><div>Day 5 - Arms + Abs 💪🔥</div><div>Day 6 - Low Cardio (1 mile) 🚶</div><div>Day 7 - Rest 🌿</div>";
  out+="<div style='margin-top:8px;color:var(--muted);font-size:.75rem'>Phase adjusts your weights and intensity. The split never stops regardless of your period.</div>";
  out+="</div></div>";
  return out;
}

// SETUP SCREEN
function renderSetup(app){
  app.innerHTML="<div class='setup'><div style='font-size:3rem;margin-bottom:16px'>🌸</div><h2>Welcome, Mansi!</h2><p>Enter the first day of your current period to get started. The tracker will handle everything else automatically.</p><input type='date' id='csSetup' value='"+toStr(today())+"'/><button class='btn bg' onclick='initCycle()'>Start My Plan</button></div>";
}

// ACTIONS
function setTab(t){S.tab=t;render();window.scrollTo(0,0);}
function selDate(ds){S.selDate=parseDate(ds);S.tab="calendar";render();setTimeout(function(){var el=document.querySelector(".card[style*='border-left']");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},60);}
function markDone(ds){S.pt.delete(ds);S.dn.add(ds);lsSave(K.DN,[...S.dn]);lsSave(K.PT,[...S.pt]);calcStreak();lsSave(K.SK,S.sk);render();}
function markPartial(ds){S.dn.delete(ds);S.pt.add(ds);lsSave(K.DN,[...S.dn]);lsSave(K.PT,[...S.pt]);calcStreak();lsSave(K.SK,S.sk);render();}
function unmark(ds){S.dn.delete(ds);S.pt.delete(ds);lsSave(K.DN,[...S.dn]);lsSave(K.PT,[...S.pt]);calcStreak();lsSave(K.SK,S.sk);render();}
function setMood(ds,m){S.mood[ds]=m;lsSave(K.MD,S.mood);render();}
function setEnergy(ds,e){S.energy[ds]=e;lsSave(K.EN,S.energy);render();}
function saveIntention(key){var el=document.getElementById("intInput");if(!el||!el.value.trim())return;S.intentions[key]=el.value.trim();lsSave(K.IT,S.intentions);render();}
function clearIntention(key){delete S.intentions[key];lsSave(K.IT,S.intentions);render();}
function saveGoal(){var el=document.getElementById("goalIn");if(!el)return;var v=parseInt(el.value);if(!v||v<1)return;S.goal=v;lsSave(K.MG,v);render();}
function saveMeas(){
  var entry={date:toStr(today())};
  for(var fi=0;fi<MFIELDS.length;fi++){
    var el=document.getElementById("meas_"+MFIELDS[fi]);
    if(el&&el.value)entry[MFIELDS[fi]]=parseFloat(el.value);
  }
  S.meas.push(entry);lsSave(K.MS,S.meas);setTab("measurements");
}
function initCycle(){var el=document.getElementById("csSetup");if(!el||!el.value)return;S.cs=el.value;lsSave(K.CS,S.cs);render();}
function updateCS(){var el=document.getElementById("csIn");if(!el||!el.value)return;S.cs=el.value;lsSave(K.CS,S.cs);render();}
function newCycle(){
  if(!confirm("Start a new cycle? Your current data will be saved to history."))return;
  S.history.push({cs:S.cs,dn:[...S.dn],pt:[...S.pt],sk:S.sk});
  lsSave(K.HI,S.history);
  S.dn=new Set();S.pt=new Set();S.selDate=null;
  lsSave(K.DN,[]);lsSave(K.PT,[]);
  var el=document.getElementById("csIn");
  S.cs=el?el.value:toStr(today());
  lsSave(K.CS,S.cs);render();
}

// INIT
render();
</script>
</body>
</html>

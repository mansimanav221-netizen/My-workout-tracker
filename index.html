<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Plan 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#27ae60;--bg:#faf8f5;--card:#fff;--text:#1a1a1a;--muted:#aaa;--border:#efefef;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;max-width:480px;margin:0 auto}
.topbar{padding:20px 18px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.topbar h1{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:-.5px}
.topbar .greeting{font-size:.78rem;color:var(--muted)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin:0 0 16px;padding:0 18px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
.page{display:none;padding:0 16px}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.banner{border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.sv{font-family:'DM Serif Display',serif;font-size:1.5rem;line-height:1;margin-bottom:2px}
.sl{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase}
.bar-bg{background:#f0f0f0;border-radius:99px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all .15s}
.btn-green{background:#2ecc71;color:#fff}.btn-green:active{background:#27ae60}
.btn-amber{background:#f39c12;color:#fff}.btn-amber:active{background:#e67e22}
.btn-red{background:#e74c3c;color:#fff}.btn-red:active{background:#c0392b}
.btn-ghost{background:#f0f0f0;color:#666}.btn-ghost:active{background:#e0e0e0}
.btn-outline{background:transparent;border:2px dashed #e0e0e0;color:#999}
.wr{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.wr:last-of-type{border-bottom:none}
.wi{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f7f7f7;border-radius:9px;font-size:1.15rem}
.wl{display:inline-flex;align-items:center;gap:4px;font-size:.71rem;font-weight:700;padding:5px 11px;border-radius:7px;color:#fff;text-decoration:none}
.wb{display:inline-block;padding:2px 7px;border-radius:99px;font-size:.63rem;font-weight:700;margin-left:5px;vertical-align:middle}
.w1{background:#ffeaea;color:#c0392b}.w2{background:#eafaf1;color:#27ae60}
.tip-box{border-radius:10px;padding:11px 13px;margin-top:12px;font-size:.78rem;line-height:1.65;color:#444}
.info-banner{display:flex;align-items:flex-start;gap:8px;border-radius:10px;padding:10px 12px;font-size:.78rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{flex:1;min-width:60px;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:transparent;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mood-btn.sel{border-color:var(--p);background:var(--p);color:#fff}
.energy-row{display:flex;gap:8px;margin-top:8px}
.energy-btn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:transparent;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.energy-btn.sel{border-color:#f39c12;background:#f39c12;color:#fff}
.leg-move{background:#f9f9f9;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--p)}
.leg-move h4{font-size:.88rem;font-weight:700;margin-bottom:3px}
.leg-move p{font-size:.76rem;color:#666;line-height:1.5}
.leg-move .sets{font-size:.72rem;font-weight:700;color:var(--p);margin-top:4px}
.milestone-pop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.milestone-inner{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%}
.milestone-inner h2{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:8px}
.milestone-inner p{font-size:.88rem;color:#777;line-height:1.6;margin-bottom:20px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cc{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.68rem;cursor:pointer;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;line-height:1.2;transition:all .15s}
.cc.hp{color:#fff;border-color:transparent}
.cc.dn::after{content:'✓';position:absolute;top:1px;right:2px;font-size:8px;font-weight:900}
.cc.partial::after{content:'◑';position:absolute;top:1px;right:2px;font-size:8px}
.cc.emp{border-color:transparent;cursor:default}
.cc-d{font-size:.74rem;font-weight:700}
.cc-c{font-size:.5rem;opacity:.85}
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meas-item{background:#f9f9f9;border-radius:10px;padding:10px 12px}
.meas-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.meas-val{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text)}
.meas-change{font-size:.68rem;margin-top:2px}
.meas-up{color:#e74c3c}.meas-down{color:#27ae60}.meas-same{color:var(--muted)}
input[type=number],input[type=text],input[type=date],textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:#fff;margin-bottom:8px}
input:focus,textarea:focus{outline:none;border-color:var(--p)}
.chart-wrap{overflow-x:auto;margin-top:8px}
canvas{max-width:100%;border-radius:10px}
.intention-box{background:#f9f9f9;border-radius:10px;padding:12px 14px;font-size:.85rem;color:#444;font-style:italic;line-height:1.5}
.progress-ring-wrap{display:flex;align-items:center;gap:16px}
.ring-info h3{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:2px}
.ring-info p{font-size:.78rem;color:var(--muted)}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.summary-row:last-child{border-bottom:none}
.summary-row span:last-child{font-weight:700;color:var(--p)}
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;padding:24px}
.setup-screen h2{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:8px}
.setup-screen p{font-size:.84rem;color:#777;line-height:1.6;margin-bottom:20px}
.phase-pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff;margin-bottom:12px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:8px}
.li{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#999}
.saf{text-align:center;font-size:.71rem;color:var(--muted);line-height:1.8;padding:16px}
.saf strong{color:#e74c3c}
.overload-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:10px 12px;font-size:.78rem;color:#856404;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const PHASES={
  menstrual:{l:"Menstruation",c:"#c0392b",lt:"#fdecea",days:[1,2,3]},
  follicular:{l:"Follicular",c:"#27ae60",lt:"#eafaf1",days:[4,5,6,7,8,9,10,11,12]},
  ovulation:{l:"Ovulation",c:"#e67e22",lt:"#fef5ec",days:[13,14,15]},
  lutealEarly:{l:"Early Luteal",c:"#8e44ad",lt:"#f5eef8",days:[16,17,18,19,20,21]},
  lutealLate:{l:"Late Luteal",c:"#2980b9",lt:"#eaf4fb",days:[22,23,24,25,26,27,28,29,30]},
};
const PO=["menstrual","follicular","ovulation","lutealEarly","lutealLate"];
const PLL={menstrual:"Menstruation (1-3)",follicular:"Follicular (4-12)",ovulation:"Ovulation (13-15)",lutealEarly:"Early Luteal (16-21)",lutealLate:"Late Luteal (22-30)"};
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MEAS_FIELDS=["weight","waist","hips","arms","thighs","calves","ankles","wrists","lowerBelly","upperBelly","neck","chest"];
const MEAS_LABELS={weight:"Weight (kg)",waist:"Waist (cm)",hips:"Hips (cm)",arms:"Arms (cm)",thighs:"Thighs (cm)",calves:"Calves (cm)",ankles:"Ankles (cm)",wrists:"Wrists (cm)",lowerBelly:"Lower Belly (cm)",upperBelly:"Upper Belly (cm)",neck:"Neck (cm)",chest:"Chest (cm)"};
const AFFIRMATIONS={
  menstrual:["Your rest is productive. Your body is renewing itself.","Softness is not weakness. Rest is strength.","You are allowed to slow down and still be enough."],
  follicular:["Energy is rising. Something new is beginning in you.","You are building momentum one rep at a time.","Your consistency is your superpower."],
  ovulation:["You are at your most powerful. Use it.","Peak energy, peak clarity, peak you. Go.","This is your window. Make it count."],
  lutealEarly:["You are stronger than you feel right now.","Showing up on the hard days is the real victory.","Your body is doing its best. So are you."],
  lutealLate:["Gentle is enough. Consistent is everything.","You do not have to earn rest. You deserve it.","Every small effort compounds into something great."],
};
const MOTIVATIONAL_TIPS={
  menstrual:"Take it easy today. A gentle walk counts as much as a full session on Day 1.",
  follicular:"This is your building phase. Each workout this week is an investment in your peak.",
  ovulation:"Your body is at its strongest right now. Push a little harder — you can handle it.",
  lutealEarly:"Energy may dip. That is normal. Show up anyway and your body will thank you.",
  lutealLate:"Almost there. Light movement now prevents the crash. Keep going gently.",
};
const VIDEOS={
  walk1:{i:"🚶",n:"Heart Healthy 1 Mile Walk",d:"Walk at Home · Gentle cardio",l:"https://youtu.be/u08lo0bESJc"},
  walk3:{i:"🚶",n:"3 Mile Heart Association Walk",d:"Walk at Home · 45 min cardio",l:"https://youtu.be/DYuw4f1c4xs"},
  arms:{i:"💪",n:"20-Min Standing Arm Workout",d:"fitbymik · No pushups",l:"https://youtu.be/M5LcX_dpL34"},
  abs:{i:"🔥",n:"10-Min Standing Abs Workout",d:"fitbymik · One dumbbell",l:"https://youtu.be/KVt_uBX-XQw"},
};
const wo=(v,k)=>({...VIDEOS[v],wt:k});

// ═══════════════════════════════════════════════════════════
// WORKOUT LOGIC (Crash-proofed)
// ═══════════════════════════════════════════════════════════
function getSplit(cycDay){
  const split = ((cycDay-1)%7)+1;
  return split > 0 ? split : 1; // Fallback if negative
}

function getWorkoutForDay(cycDay,phase){
  const split=getSplit(cycDay);
  const is2kg=["follicular","ovulation","lutealEarly"].includes(phase);
  const kg=is2kg?"2kg":"1kg";
  
  if(split===1)return{type:"workout",focus:"Arms",ws:[wo("arms",kg)],tip:"Slow your reps — 3 counts down, 1 up. Makes "+kg+" feel twice as hard."};
  if(split===2)return{type:"workout",focus:"Cardio",ws:[wo("walk3",null)],tip:phase==="ovulation"?"Peak energy day — push your pace the full 45 mins!":"Steady pace, consistent effort. Full 3 miles today."};
  if(split===3)return{type:"legs",focus:"Legs"};
  if(split===4)return{type:"rest",note:"Rest day. Recovery is where your muscles actually grow. This is productive."};
  if(split===5)return{type:"workout",focus:"Arms + Abs",ws:[wo("arms",kg),wo("abs",kg)],tip:"Arms then abs back to back. Add 5 pulse reps at the end of each move."};
  if(split===6)return{type:"workout",focus:"Cardio",ws:[wo("walk1",null)],tip:"Gentle cardio day. 1 mile, easy pace, focus on breathing."};
  
  // Default fallback prevents fatal 'undefined' crash
  return{type:"rest",note:"Rest day. Two rest days per week keeps you sustainable for months, not just weeks."};
}

const LEG_MOVES=[
  {name:"Standing Side Leg Raises",desc:"Stand tall, hold wall or chair for balance. Lift one leg straight out to the side, keeping toes forward. No higher than hip height. Slow and controlled.",sets:"3 sets × 15 reps each side · rest 30 sec"},
  {name:"Standing Rear Kickbacks",desc:"Hold support, tilt slightly forward. Kick one leg straight back — small range, squeeze glute at top. Do NOT swing or arch back.",sets:"3 sets × 15 reps each side · rest 30 sec"},
  {name:"Inner Thigh Standing Pulses",desc:"Stand with feet wider than hip width. Pulse one knee gently inward, squeezing inner thigh. Keep movement small and controlled.",sets:"3 sets × 20 pulses each side · rest 20 sec"},
  {name:"Calf Raises",desc:"Stand with feet hip width. Rise onto toes slowly, hold 1 second at top, lower slowly. Hold chair for balance if needed.",sets:"3 sets × 20 reps · rest 20 sec"},
  {name:"Standing Hip Abduction Hold",desc:"Lift one leg out to the side and HOLD for 10 seconds. Lower slowly. This builds hip stability without impact.",sets:"3 holds × 10 sec each side · rest 20 sec"},
];
const WARMUP=["Shoulder rolls — 10 forward, 10 back","Neck rolls — slow, 5 each direction","Ankle circles — 10 each foot","Arm circles — 10 small, 10 large each arm","March in place — 1 minute, knees low"];
const COOLDOWN=["Calf stretch — hold wall, 30 sec each leg","Shoulder cross stretch — 30 sec each arm","Standing quad stretch — hold support, 20 sec each leg","Deep breathing — 5 slow breaths in through nose, out through mouth"];
const MILESTONES=[7,14,21,30,60,90];
const MILESTONE_MSG={7:"One full week of showing up. That is not nothing — that is everything.",14:"Two weeks. Your body is already changing. Keep going.",21:"21 days. Science says this is where habits form. You built one.",30:"30 days. One full cycle of consistency. You are different now.",60:"60 days. Two months of showing up for yourself. Incredible.",90:"90 days. This is not a routine anymore. This is who you are."};

// ═══════════════════════════════════════════════════════════
// STORAGE (Crash-proofed)
// ═══════════════════════════════════════════════════════════
const K={CS:"wt3_cs",DN:"wt3_dn",SK:"wt3_sk",MD:"wt3_md",EN:"wt3_en",MS:"wt3_ms",IT:"wt3_it",MG:"wt3_mg",HI:"wt3_hi",PD:"wt3_pd",SEEN_MS:"wt3_seen_ms"};

function ls(k, fb=null) {
  try {
    const v = localStorage.getItem(k);
    if (v === null) return fb;
    const parsed = JSON.parse(v);
    return parsed !== null ? parsed : fb;
  } catch {
    return fb;
  }
}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ═══════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function pd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function d2s(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function df(a,b){return Math.round((b-a)/86400000)}
function fdate(d){return`${DOW[d.getDay()]}, ${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`}
function fshort(d){return`${d.getDate()} ${MON[d.getMonth()].slice(0,3)}`}
function getHour(){return new Date().getHours()}
function greeting(){const h=getHour();if(h<12)return"Good morning";if(h<17)return"Good afternoon";return"Good evening"}

// ═══════════════════════════════════════════════════════════
// PHASE
// ═══════════════════════════════════════════════════════════
function gp(d){if(d<=3)return"menstrual";if(d<=12)return"follicular";if(d<=15)return"ovulation";if(d<=21)return"lutealEarly";return"lutealLate"}

// ═══════════════════════════════════════════════════════════
// STATE (Crash-proofed Type Enforcement)
// ═══════════════════════════════════════════════════════════
let S={
  cs:ls(K.CS,null),
  dn:new Set(Array.isArray(ls(K.DN)) ? ls(K.DN) : []),
  partial:new Set(Array.isArray(ls(K.PD)) ? ls(K.PD) : []),
  sk:ls(K.SK,{c:0,l:0}) || {c:0,l:0},
  mood:ls(K.MD,{}) || {},
  energy:ls(K.EN,{}) || {},
  measurements:Array.isArray(ls(K.MS)) ? ls(K.MS) : [],
  intentions:ls(K.IT,{}) || {},
  monthGoal:ls(K.MG,{goal:20,set:false}) || {goal:20,set:false},
  history:Array.isArray(ls(K.HI)) ? ls(K.HI) : [],
  seenMilestones:new Set(Array.isArray(ls(K.SEEN_MS)) ? ls(K.SEEN_MS) : []),
  activeTab:"today",
  selectedDate:null,
  pendingMilestone:null,
};

// ═══════════════════════════════════════════════════════════
// CYCLE HELPERS (Crash-proofed future dates)
// ═══════════════════════════════════════════════════════════
function cycleDay(date){
  if(!S.cs)return 1;
  const diff=df(pd(S.cs),date)+1;
  // If date is in the future relative to cycle start, default to Day 1 instead of crashing
  if(diff<1)return 1; 
  return((diff-1)%30)+1;
}
function calDate(cd){return new Date(pd(S.cs).getTime()+(cd-1)*86400000)}

// ═══════════════════════════════════════════════════════════
// STREAK
// ═══════════════════════════════════════════════════════════
function rsk(){
  const allDone=new Set([...S.dn,...S.partial]);
  const so=[...allDone].map(s=>pd(s)).sort((a,b)=>a-b);
  if(!so.length){S.sk={c:0,l:0};return}
  let l=1,c=1;
  for(let i=1;i<so.length;i++){if(df(so[i-1],so[i])===1){c++;l=Math.max(l,c)}else c=1}
  let cur=0,ch=today();
  while(true){const s=d2s(ch);if(allDone.has(s)){cur++;ch=new Date(ch-86400000)}else break}
  S.sk={c:cur,l:Math.max(l,cur)};
  lss(K.SK,S.sk);
  // Check milestones
  MILESTONES.forEach(m=>{if(S.sk.c>=m&&!S.seenMilestones.has(m)){S.pendingMilestone=m;S.seenMilestones.add(m);lss(K.SEEN_MS,[...S.seenMilestones])}});
}

// ═══════════════════════════════════════════════════════════
// MONTHLY STATS
// ═══════════════════════════════════════════════════════════
function monthStats(){
  if(!S.cs)return null;
  const start=pd(S.cs);
  let done=0,partial=0,rest=0,legDays=0,armDays=0,cardio=0,abs=0;
  for(let i=0;i<30;i++){
    const dt=new Date(start.getTime()+i*86400000);
    const ds=d2s(dt);
    const cd=i+1;
    const isDone=S.dn.has(ds),isPart=S.partial.has(ds);
    if(isDone||isPart){
      const w=getWorkoutForDay(cd,gp(cd));
      if(w.type==="rest")rest++;
      else if(w.type==="legs")legDays++;
      else{
        done++;
        if(w.focus==="Arms")armDays++;
        else if(w.focus==="Cardio")cardio++;
        else if(w.focus==="Arms + Abs"){armDays++;abs++}
      }
      if(isPart)partial++;
    }
  }
  return{done,partial,legDays,armDays,cardio,abs};
}

// ═══════════════════════════════════════════════════════════
// OVERLOAD CHECK 
// ═══════════════════════════════════════════════════════════
function showOverload(){
  if(!S.cs)return false;
  const dayIn=df(pd(S.cs),today())+1;
  return dayIn>=28&&dayIn<=31;
}

// ═══════════════════════════════════════════════════════════
// RENDER MAIN
// ═══════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(!S.cs){renderSetup(app);return}
  rsk();
  const tabs=["today","calendar","measurements","progress","settings"];
  const tabLabels={today:"Today",calendar:"Calendar",measurements:"Measure",progress:"Progress",settings:"Settings"};
  let html=`<div class="topbar">
    <div><div style="font-size:.72rem;color:var(--muted)">${greeting()}, Mansi 🌸</div><h1>My Workout</h1></div>
    <div style="text-align:right"><div style="font-size:.72rem;color:var(--muted)">${fdate(today())}</div><div style="font-size:.8rem;font-weight:700;color:var(--p)">Day ${cycleDay(today())} · ${PHASES[gp(cycleDay(today()))].l}</div></div>
  </div>`;
  html+=`<div class="tabs">${tabs.map(t=>`<div class="tab${S.activeTab===t?" active":""}" onclick="setTab('${t}')">${tabLabels[t]}</div>`).join("")}</div>`;
  app.innerHTML=html;

  const pages=document.createElement("div");
  pages.innerHTML=`
    <div class="page${S.activeTab==="today"?" active":""}" id="page-today">${renderToday()}</div>
    <div class="page${S.activeTab==="calendar"?" active":""}" id="page-calendar">${renderCalendar()}</div>

  `;
  app.appendChild(pages);

  if(S.pendingMilestone){
    const m=S.pendingMilestone;
    S.pendingMilestone=null;
    const pop=document.createElement("div");
    pop.className="milestone-pop";
    pop.innerHTML=`<div class="milestone-inner">
      <div style="font-size:3rem;margin-bottom:12px">🏆</div>
      <h2>${m} Day Streak!</h2>
      <p>${MILESTONE_MSG[m]}</p>
      <button class="btn btn-green" onclick="this.closest('.milestone-pop').remove()">Keep Going 💪</button>
    </div>`;
    app.appendChild(pop);
  }
}

  </div>`;

  // Safety
  h+=`<div class="saf">💧 Always hydrate before and during workouts<br><strong>Stop immediately</strong> if you feel bone pain, chest tightness, or dizziness</div>`;
  return h;
}

  }
  h+=`</div><button class="btn btn-ghost" style="margin-top:8px" onclick="selDate('${ts}')">📍 Jump to Today</button></div>`;

  // Selected day detail
  if(scd){
    const phase=gp(scd);
    const p=PHASES[phase];
    const w=getWorkoutForDay(scd,phase);

    const isDone=S.dn.has(selDs),isPartial=S.partial.has(selDs);

    h+=`<div class="card" style="border-left:4px solid ${p.c}">

      w.type==="legs"?`<div style="font-weight:700;margin-bottom:8px">🦵 Leg Day</div>${LEG_MOVES.map(m=>`<div style="font-size:.78rem;padding:4px 0;border-bottom:1px solid var(--border)"><strong>${m.name}</strong> — ${m.sets}</div>`).join("")}`:
      `<div style="font-weight:700;margin-bottom:8px">💪 ${w.focus}</div>${w.ws.map(wk=>{const b=wk.wt?`<span class="wb ${wk.wt==="1kg"?"w1":"w2"}">${wk.wt}</span>`:"";return`<div class="wr"><div class="wi">${wk.i}</div><div style="flex:1"><div style="font-weight:600;font-size:.85rem">${wk.n}${b}</div><a class="wl" href="${wk.l}" target="_blank" style="background:${p.c};margin-top:4px">▶ YouTube</a></div></div>`}).join("")}`}

  return h;
}

// MEASUREMENTS PAGE
// ═══════════════════════════════════════════════════════════
function renderMeasurements(){
  const last=S.measurements.length>0?S.measurements[S.measurements.length-1]:null;
  const prev=S.measurements.length>1?S.measurements[S.measurements.length-2]:null;
  let h=``;

  if(last){
    h+=`<div class="card"><div class="lbl">Latest — ${last.date}</div><div class="meas-grid">`;
    MEAS_FIELDS.forEach(f=>{
      const val=last[f]||"—";
      const prevVal=prev?prev[f]:null;
      let changeHtml="";
      if(prevVal&&last[f]){
        const diff=(parseFloat(last[f])-parseFloat(prevVal)).toFixed(1);
        const cls=f==="weight"?(diff<0?"meas-down":"meas-up"):(diff<0?"meas-down":"meas-up");
        if(diff!=0)changeHtml=`<div class="meas-change ${cls}">${diff>0?"+":""}${diff} from last</div>`;
        else changeHtml=`<div class="meas-change meas-same">No change</div>`;
      }
      h+=`<div class="meas-item"><div class="meas-label">${MEAS_LABELS[f].replace(" (kg)","").replace(" (cm)","")}</div><div class="meas-val">${val}${last[f]?(f==="weight"?" kg":" cm"):""}</div>${changeHtml}</div>`;
    });
    h+=`</div></div>`;
  }

  h+=`<div class="card"><div class="lbl">📏 Log New Measurements</div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:12px">Log once a month for the clearest progress picture.</div>
    ${MEAS_FIELDS.map(f=>`<div style="margin-bottom:4px"><label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:2px">${MEAS_LABELS[f]}</label><input type="number" step="0.1" id="meas_${f}" placeholder="Enter value" ${last&&last[f]?`value="${last[f]}"`:""}/></div>`).join("")}
    <button class="btn btn-green" onclick="saveMeasurements()">Save Measurements</button>
  </div>`;

  if(S.measurements.length>1){
    h+=`<div class="card"><div class="lbl">📊 Progress History</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.72rem">
        <tr>${["Date",...MEAS_FIELDS.map(f=>MEAS_LABELS[f].split(" ")[0])].map(h=>`<th style="padding:6px 4px;text-align:left;color:var(--muted);font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap">${h}</th>`).join("")}</tr>
        ${S.measurements.slice().reverse().map(m=>`<tr>${["date",...MEAS_FIELDS].map(f=>`<td style="padding:5px 4px;border-bottom:1px solid var(--border);white-space:nowrap">${m[f]||"—"}</td>`).join("")}</tr>`).join("")}
      </table></div>
    </div>`;
  }
  return h;
}

    </div>
  </div>`;

  // Cycle progress
  h+=`<div class="card">
    <div class="lbl">📅 This Cycle</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:.84rem">Day ${cd} of 30</span>
      <span style="font-size:.84rem;font-weight:700;color:var(--p)">${Math.round((cd/30)*100)}% through</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${(cd/30)*100}%;background:linear-gradient(90deg,${PHASES[gp(cd)].c},${PHASES[gp(cd)].c}aa)"></div></div>
  </div>`;

    h+=`<div class="card"><div class="lbl">💪 Workout Breakdown</div>
      <div class="summary-row"><span>Completed workouts</span><span>${stats.done}</span></div>
      <div class="summary-row"><span>Partial credit days</span><span>${stats.partial}</span></div>
      <div class="summary-row"><span>Arm days done</span><span>${stats.armDays}</span></div>
      <div class="summary-row"><span>Cardio days done</span><span>${stats.cardio}</span></div>
      <div class="summary-row"><span>Leg days done</span><span>${stats.legDays}</span></div>
      <div class="summary-row"><span>Abs sessions done</span><span>${stats.abs}</span></div>
      <div class="summary-row"><span>Current streak</span><span>🔥 ${S.sk.c} days</span></div>
      <div class="summary-row"><span>Best streak ever</span><span>🏆 ${S.sk.l} days</span></div>
    </div>`;
  }

  // Mood summary
  const moodEntries=Object.values(S.mood);
  if(moodEntries.length>0){
    const moodCount={};
    moodEntries.forEach(m=>{moodCount[m]=(moodCount[m]||0)+1});
    h+=`<div class="card"><div class="lbl">😊 Mood This Cycle</div>
      ${Object.entries(moodCount).sort((a,b)=>b[1]-a[1]).map(([m,c])=>`
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px"><span>${m}</span><span>${c} days</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round((c/moodEntries.length)*100)}%;background:#8e44ad"></div></div>
        </div>`).join("")}
    </div>`;
  }

  // Measurement chart
  if(S.measurements.length>1){
    h+=`<div class="card"><div class="lbl">📈 Weight Progress</div>
      <canvas id="weightChart" height="180"></canvas>
    </div>`;
    setTimeout(()=>{
      const canvas=document.getElementById("weightChart");
      if(!canvas)return;
      const ctx=canvas.getContext("2d");
      const data=S.measurements.map(m=>parseFloat(m.weight)||0).filter(v=>v>0);
      const labels=S.measurements.filter(m=>m.weight).map(m=>m.date);
      if(data.length<2)return;
      
      const parentWidth = canvas.parentElement.offsetWidth;
      if (parentWidth === 0) return; // Tab is hidden, skip drawing
      canvas.width = parentWidth - 32;
      
      const w=canvas.width,canvasH=180,pad=40;
      const minV=Math.min(...data)-2,maxV=Math.max(...data)+2;
      ctx.clearRect(0,0,w,canvasH);
      ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;
      for(let i=0;i<=4;i++){const y=pad+(canvasH-pad*2)*(i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-10,y);ctx.stroke();ctx.fillStyle="#aaa";ctx.font="10px DM Sans";ctx.fillText((maxV-(maxV-minV)*(i/4)).toFixed(1),2,y+4)}
      ctx.strokeStyle="#27ae60";ctx.lineWidth=2.5;ctx.beginPath();
      data.forEach((v,i)=>{const x=pad+(w-pad-10)*i/(data.length-1);const y=pad+(canvasH-pad*2)*(maxV-v)/(maxV-minV);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
      ctx.stroke();
      ctx.fillStyle="#27ae60";
      data.forEach((v,i)=>{const x=pad+(w-pad-10)*i/(data.length-1);const y=pad+(canvasH-pad*2)*(maxV-v)/(maxV-minV);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.fillStyle="#333";ctx.font="9px DM Sans";ctx.fillText(v,x-8,y-8);ctx.fillStyle="#27ae60"});
    },100);
  }
  return h;
}

    <div class="lbl">📊 Cycle History</div>
    ${S.history.length===0?`<div style="font-size:.82rem;color:var(--muted);text-align:center;padding:12px">No previous cycles yet</div>`:
    S.history.slice(-3).reverse().map((cyc,i)=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-size:.82rem;font-weight:600">Cycle ${S.history.length-i}</div><div style="font-size:.75rem;color:var(--muted)">Started: ${cyc.cs} · ${cyc.dn?cyc.dn.length:0} days completed</div></div>`).join("")}
  </div>`;
  h+=`<div class="card">
    <div class="lbl">ℹ️ About Your Plan</div>
    <div style="font-size:.78rem;color:#555;line-height:1.7">
      <div style="margin-bottom:6px"><strong>7-day rotating split:</strong></div>
      <div>Day 1 — Arms 💪</div>
      <div>Day 2 — High Cardio (3 miles) 🚶</div>
      <div>Day 3 — Legs (ankle weights) 🦵</div>
      <div>Day 4 — Rest 🌿</div>
      <div>Day 5 — Arms + Abs 💪🔥</div>
      <div>Day 6 — Low Cardio (1 mile) 🚶</div>
      <div>Day 7 — Rest 🌿</div>
      <div style="margin-top:8px;color:var(--muted)">Phase adjusts weights and intensity. Split never stops.</div>
    </div>
  </div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════
function renderSetup(app){
  app.innerHTML=`<div class="setup-screen">
    <div style="font-size:3rem;margin-bottom:16px">🌸</div>
    <h2>Welcome, Mansi!</h2>
    <p>Enter the first day of your current period to get started. The tracker will figure out everything else automatically.</p>
    <input type="date" id="csSetup" value="${d2s(today())}"/>
    <button class="btn btn-green" onclick="initCycle()">Start My Plan</button>
  </div>`;
}
function initCycle(){
  const v=document.getElementById("csSetup").value;
  if(!v)return;
  S.cs=v;lss(K.CS,v);render();
}
function updateCycleStart(){
  const v=document.getElementById("csInput").value;
  if(!v)return;
  S.cs=v;lss(K.CS,v);render();
}
function newCycle(){
  if(!confirm("Start a new cycle? This saves your current data to history."))return;
  S.history.push({cs:S.cs,dn:[...S.dn],partial:[...S.partial],sk:S.sk});
  lss(K.HI,S.history);
  S.dn=new Set();S.partial=new Set();S.selectedDate=null;
  lss(K.DN,[]);lss(K.PD,[]);
  const v=document.getElementById("csInput")?document.getElementById("csInput").value:d2s(today());
  S.cs=v;lss(K.CS,v);render();
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function setTab(t){S.activeTab=t;render();window.scrollTo(0,0)}
function selDate(ds){S.selectedDate=pd(ds);S.activeTab="calendar";render();setTimeout(()=>{const el=document.querySelector(".card[style*='border-left']");if(el)el.scrollIntoView({behavior:"smooth",block:"start"})},50)}
function markDone(ds){S.partial.delete(ds);S.dn.add(ds);lss(K.DN,[...S.dn]);lss(K.PD,[...S.partial]);rsk();lss(K.SK,S.sk);render()}
function markPartial(ds){S.dn.delete(ds);S.partial.add(ds);lss(K.DN,[...S.dn]);lss(K.PD,[...S.partial]);rsk();lss(K.SK,S.sk);render()}
function unmark(ds){S.dn.delete(ds);S.partial.delete(ds);lss(K.DN,[...S.dn]);lss(K.PD,[...S.partial]);rsk();lss(K.SK,S.sk);render()}
function setMood(ds,m){S.mood[ds]=m;lss(K.MD,S.mood);render()}
function setEnergy(ds,e){S.energy[ds]=e;lss(K.EN,S.energy);render()}
function saveIntention(key){const v=document.getElementById("intentionInput").value.trim();if(!v)return;S.intentions[key]=v;lss(K.IT,S.intentions);render()}
function setIntention(key){delete S.intentions[key];lss(K.IT,S.intentions);render()}
function saveGoal(){const v=parseInt(document.getElementById("goalInput").value);if(!v||v<1)return;S.monthGoal={goal:v,set:true};lss(K.MG,S.monthGoal);render()}
function saveMeasurements(){
  const entry={date:d2s(today())};
  MEAS_FIELDS.forEach(f=>{const el=document.getElementById("meas_"+f);if(el&&el.value)entry[f]=parseFloat(el.value)});
  S.measurements.push(entry);lss(K.MS,S.measurements);render();setTab("measurements");
}
function getMonday(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff))}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
